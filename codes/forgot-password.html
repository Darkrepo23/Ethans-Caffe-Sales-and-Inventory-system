<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Ethan's Cafe</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #f8f9fa; }
        .forgot-container { max-width: 400px; margin: 60px auto; background: #fff; border-radius: 16px; box-shadow: 0 8px 32px rgba(0,0,0,0.12); padding: 32px 28px; }
        .logo { display: block; margin: 0 auto 18px; height: 70px; border-radius: 50%; }
        .form-label { font-weight: 600; }
        .btn-maroon { background: #800000; color: #fff; border: none; }
        .btn-maroon:hover { background: #a64d4d; }
    </style>
</head>
<body>
    <div class="forgot-container">
        <img src="resources/ethans logo.jpg" alt="Logo" class="logo">
        <h3 class="text-center mb-4">Forgot Password</h3>
        <form id="forgotPasswordForm">
            <div class="mb-3">
                <label for="forgotEmail" class="form-label"><i class="fas fa-envelope me-2"></i>Email address</label>
                <input type="email" class="form-control" id="forgotEmail" name="forgotEmail" placeholder="Enter your email" required>
            </div>
            <div class="d-grid mb-3">
                <button type="submit" class="btn btn-maroon">Send OTP</button>
            </div>
            <div id="forgotAlert" class="alert d-none" role="alert"></div>
        </form>
        <div class="text-center mt-3">
            <a href="index.html" class="text-decoration-none"><i class="fas fa-arrow-left me-1"></i>Back to Login</a>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script src="forgot-password.js"></script>
</body>
</html>
